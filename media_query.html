<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @media only screen and (min-width:320px) and (max-width:767px){
            body{
                background-color: yellow;
            }

        }
        @media(min-width:768px){
            body{
                background-color: aqua;
            }
        }
        @media(min-width:1024px){
            body{
                background-color: red;
            }
        }
    </style>
    
</head>
<body>
    <img src="Images/Forest2.jpeg" width="300px" height="300px" alt="avtar"/>
    <img src="Images/Leoperd.jpeg"width="300px" height="300px" alt="avtar"/>
    <h1>CSS Media Queries</h1>
    <p>The background will change according to the viewport width change</p>

    <h3>Smartphones</h3>

    <h4>iphone</h4>
</body>
</html>
